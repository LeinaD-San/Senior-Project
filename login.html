<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trAgent — Account</title>
  <style>
    :root{
      --bg:#ffffff;
      --ink:#0b1220;
      --muted:rgba(11,18,32,.65);
      --border:rgba(11,18,32,.12);
      --card:rgba(57, 1, 1, 0.92);
      --orange:#ff6a00;
      --orange2:#ff9a3d;
      --shadow:0 16px 40px rgba(11,18,32,.10);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--ink);
      background:
        radial-gradient(900px 560px at 14% 6%, rgba(255,154,61,.16), transparent 62%),
        radial-gradient(800px 520px at 88% 12%, rgba(255,106,0,.10), transparent 64%),
        radial-gradient(900px 600px at 50% 110%, rgba(255,183,3,.10), transparent 62%),
        var(--bg);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .panel{
      width:100%;
      max-width:420px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }
    .head{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .brand{font-weight:900;letter-spacing:-.02em}
    .tabs{display:flex;gap:8px;margin-top:12px}
    .tab{
      flex:1;
      border:1px solid var(--border);
      background:white;
      padding:10px 12px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      color:var(--muted);
    }
    .tab.active{background:var(--ink);border-color:var(--ink);color:white}
    label{display:block;font-weight:800;font-size:13px;margin:12px 0 6px}
    input{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--border);
      font-size:14px;
      outline:none;
      background:white;
    }
    .primary{
      width:100%;
      border:none;
      padding:12px 14px;
      border-radius:14px;
      font-weight:900;
      color:white;
      background:linear-gradient(135deg,var(--orange),var(--orange2));
      cursor:pointer;
      margin-top:14px;
      box-shadow:0 18px 50px rgba(255,106,0,.20);
    }
    .error{margin-top:10px;color:#b91c1c;font-weight:800;font-size:13px;min-height:18px}
    .muted{color:var(--muted);font-size:12px;margin-top:8px}
    a{color:var(--ink);font-weight:800;text-decoration:none}
  </style>
</head>
<body>
  <div class="panel">
    <div class="head">
      <div class="brand">trAgent Account</div>
      <a id="backLink" href="/">Back</a>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabLogin" type="button" onclick="setMode('login')">Login</button>
      <button class="tab" id="tabRegister" type="button" onclick="setMode('register')">Create account</button>
    </div>

    <label for="name" id="nameLabel" style="display:none;">Name</label>
    <input id="name" type="text" placeholder="Your name" maxlength="120" style="display:none;"/>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" maxlength="320" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="At least 8 characters" maxlength="200" />

    <button class="primary" type="button" onclick="submitAuth()">Continue</button>
    <div class="error" id="error"></div>
    <div class="muted">We store a session token in your browser for this demo.</div>
  </div>

  <script>
    let mode = 'login';

    function qs(key) {
      const url = new URL(window.location.href);
      return url.searchParams.get(key);
    }

    function nextUrl() {
      return qs('next') || '/';
    }

    document.getElementById('backLink').href = nextUrl();

    function setMode(nextMode) {
      mode = nextMode;
      document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
      document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
      document.getElementById('error').textContent = '';

      const showName = mode == 'register';
      document.getElementById('nameLabel').style.display = showname ? 'block' : 'none';
      document.getelementById('name').style.display = showName? 'block' : 'none';
    }

    function setToken(token) {
      if (!token) localStorage.removeItem('tragent_token');
      else localStorage.setItem('tragent_token', token);
    }

    async function submitAuth() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      document.getElementById('error').textContent = '';

      if (mode == 'register' && !name)
      {
        document.getElementById('error').textContent = 'Name is required.';
        return;
      }

      if (!email || !password) {
        document.getElementById('error').textContent = 'Email and password are required.';
        return;
      }

      const path = mode === 'register' ? '/auth/register' : '/auth/login';

      const payload = mode == 'register'
      ? {name, email, password}
      : {email, password};

      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        document.getElementById('error').textContent = data.detail || 'Authentication failed.';
        return;
      }

      setToken(data.token);

      if(data.user) {
        localStorage.setItem('tragent_user', JSON.stringify(data.user));
      }
      
      window.location.href = nextUrl();
    }
  </script>
</body>
</html>
