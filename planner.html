<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>trAgent Planner</title>
  <style>
    :root{
      --bg:#ffffff;
      --ink:#0b1220;
      --muted:rgba(11,18,32,.65);
      --border:rgba(11,18,32,.12);
      --card:rgba(255,255,255,.92);
      --orange:#ff6a00;
      --orange2:#ff9a3d;
      --shadow:0 16px 40px rgba(11,18,32,.10);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--ink);
      background:
        radial-gradient(900px 560px at 14% 6%, rgba(255,154,61,.16), transparent 62%),
        radial-gradient(800px 520px at 88% 12%, rgba(255,106,0,.10), transparent 64%),
        radial-gradient(900px 600px at 50% 110%, rgba(255,183,3,.10), transparent 62%),
        var(--bg);
    }
    header{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 22px;
    }
    .brand{display:flex;gap:10px;align-items:center;font-weight:900;letter-spacing:-.02em}
    .brandDot{
      width:34px;height:34px;border-radius:12px;
      background:linear-gradient(135deg,var(--orange),var(--orange2));
      box-shadow:0 18px 50px rgba(255,106,0,.25);
    }
    .topActions a{color:var(--muted);text-decoration:none;font-weight:700}
    .topActions a:hover{color:var(--ink)}
    .topActions button{border:none;background:transparent;color:var(--muted);font-weight:800;cursor:pointer}
    .topActions button:hover{color:var(--ink)}

    .savedCard{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:14px;
    }
    .savedTitle{font-weight:900}
    .savedList{margin-top:10px;display:flex;flex-direction:column;gap:10px}
    .savedItem{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:14px;border:1px solid var(--border);background:white}
    .savedMeta{flex:1;min-width:0}
    .savedName{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .savedSub{margin-top:2px;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .savedBtn{border:1px solid var(--border);background:white;border-radius:12px;padding:8px 10px;font-weight:900;cursor:pointer}
    .savedBtn:hover{background:rgba(11,18,32,.04)}
    .danger{color:#b91c1c}
    .wrap{
      max-width:1200px;margin:0 auto;padding:0 16px 28px;
    }
    .layout{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:16px;
      align-items:start;
    }
    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      .sticky{position:static;height:auto}
    }

    /* LEFT: itinerary notepad */
    .panel{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .sticky{
      position:sticky;
      top:16px;
      height:calc(100vh - 32px);
      display:flex;
      flex-direction:column;
    }
    .panelHead{
      padding:14px 14px 10px;
      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,.9);
    }
    .panelHead h2{margin:0;font-size:16px}
    .panelHead .sub{margin-top:4px;color:var(--muted);font-size:13px}
    .dayRow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .dayBtn{
      padding:8px 12px;border-radius:999px;
      border:1px solid var(--border);
      background:white;
      font-weight:700;font-size:13px;cursor:pointer;
    }
    .dayBtn.active{background:var(--ink);color:white;border-color:var(--ink)}
    .list{
      padding:12px;
      overflow:auto;
      flex:1;
    }
    .empty{
      color:var(--muted);
      border:1px dashed var(--border);
      border-radius:12px;
      padding:12px;
      font-size:13px;
    }
    .item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 10px;
      background:white;
      margin-bottom:10px;
      display:flex;gap:10px;align-items:flex-start;
    }
    .num{
      width:26px;height:26px;border-radius:50%;
      background:linear-gradient(135deg,var(--orange),var(--orange2));
      color:white;font-weight:900;
      display:flex;align-items:center;justify-content:center;
      flex:0 0 auto;
      margin-top:2px;
      font-size:13px;
    }
    .meta{flex:1;min-width:0}
    .name{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .addr{color:var(--muted);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .itemActions{display:flex;gap:6px}
    .iconBtn{
      border:none;background:transparent;cursor:pointer;
      color:var(--muted);font-size:16px;line-height:1;
      padding:6px;border-radius:10px;
    }
    .iconBtn:hover{background:rgba(11,18,32,.06);color:var(--ink)}
    .panelFoot{
      padding:12px;
      border-top:1px solid var(--border);
      background:rgba(255,255,255,.9);
    }
    .primary{
      width:100%;
      border:none;
      padding:12px 14px;
      border-radius:14px;
      font-weight:900;
      color:white;
      background:linear-gradient(135deg,var(--orange),var(--orange2));
      cursor:pointer;
      box-shadow:0 18px 50px rgba(255,106,0,.20);
    }
    .primary:disabled{opacity:.55;cursor:not-allowed}

    /* RIGHT: search + results */
    .searchCard{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:14px;
    }
    .searchRow{
      display:flex;gap:10px;flex-wrap:wrap;
      align-items:center;
    }
    .searchRow input{
      flex:1;
      min-width:220px;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--border);
      font-size:14px;
      outline:none;
      background:white;
    }
    .searchRow button{
      border:none;
      padding:12px 14px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      background:var(--ink);
      color:white;
    }
    .hint{color:var(--muted);font-size:12px;margin-top:8px}
    .results{display:flex;flex-direction:column;gap:12px}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 10px 26px rgba(11,18,32,.08);
      padding:14px;
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .thumb{
      width:92px;height:92px;border-radius:14px;
      background:rgba(11,18,32,.06);
      flex:0 0 auto;
      display:flex;align-items:center;justify-content:center;
      color:var(--muted);font-weight:800;font-size:12px;
    }
    .cardBody{flex:1;min-width:0}
    .cardTitle{font-weight:900}
    .cardAddr{color:var(--muted);font-size:13px;margin-top:4px}
    .cardRow{display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap}
    .pill{
      font-size:12px;font-weight:800;
      padding:6px 10px;border-radius:999px;
      border:1px solid var(--border);background:white;color:var(--muted);
    }
    .addBtn{
      margin-left:auto;
      border:none;
      padding:10px 12px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      background:linear-gradient(135deg,var(--orange),var(--orange2));
      color:white;
    }
    .addBtn[disabled]{opacity:.55;cursor:not-allowed}
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <div class="brandDot" aria-hidden="true"></div>
      <div>trAgent Planner</div>
    </div>
    <div class="topActions">
      <a href="/">Back to home</a>
      <span style="padding:0 8px;color:rgba(11,18,32,.35)">|</span>
      <a id="signInLink" href="/login">Sign in</a>
      <button id="logoutBtn" type="button" onclick="logout()" style="display:none">Log out</button>
    </div>
  </header>

  <div class="wrap">
    <div class="layout">
      <!-- LEFT: Itinerary notepad -->
      <div class="panel sticky">
        <div class="panelHead">
          <h2>Itinerary Notepad</h2>
          <div class="sub">
            Select a day, then add places from the results.
          </div>

          <div class="dayRow" id="dayRow"></div>
        </div>

        <div class="list" id="itinList">
          <div class="empty">No places added yet. Search on the right, then click <b>Add to Trip</b>.</div>
        </div>

        <div class="panelFoot">
          <button class="primary" id="saveBtn" onclick="saveTrip()" disabled>Save Trip</button>
        </div>
      </div>

      <!-- RIGHT: Search + results -->
      <div>
        <div class="savedCard" id="savedTripsCard" style="display:none">
          <div class="savedTitle">My Saved Trips</div>
          <div class="savedList" id="savedTripsList"></div>
        </div>
<!--
        <div class="searchCard">
          <div class="searchRow">
            <input id="q" placeholder="Search places (e.g., 'parks in San Antonio' or 'museums Brownsville')" />
            <button onclick="runSearch()">Search</button>
          </div>
          <div class="hint">Powered by your backend <code>/places/search</code>. Add results to the notepad on the left.</div> 
        -->
        <div class="searchCard">
          <div class="searchRow">
            <input id="q" placeholder="Search places (e.g., 'parks in San Antonio' or 'museums Brownsville')" />
            <button onclick="runSearch()">Search</button>
            <button type="button" onclick="runAiGenerate()" style="background:linear-gradient(135deg,var(--orange),var(--orange2));color:white;">
              Auto-Generate
            </button>
          </div>
        

        </div>
        <div id="plannerProfileSummary" style="
      margin-top:12px;
      padding:12px 14px;
      border:1px solid rgba(11,18,32,.10);
      border-radius:14px;
      background:rgba(11,18,32,.03);
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    ">
      No personalization loaded yet.
    </div>

        <div class="results" id="results"></div>
      </div>
    </div>
  </div>

  <script>
    // Use same-origin since this page is served by FastAPI
    const API_BASE = '';

    async function openDetails(placeId) {
      const modal = document.getElementById("detailsModal");
      const title = document.getElementById("detailsTitle");
      const body = document.getElementById("detailsBody");
      modal.style.display = "block";
      title.textContent = "Loading…";
      body.textContent = "Loading…";

        try {
          const res = await fetch(`/places/details/${encodeURIComponent(placeId)}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Failed to load details");

          title.textContent = data.name || "Place details";

          const hoursHtml = (data.hours && data.hours.length)
            ? `<div style="margin-top:10px;"><div style="font-weight:900;margin-bottom:6px;">Hours</div>
                <div style="color:rgba(11,18,32,.75); font-size:14px; line-height:1.5;">
                  ${data.hours.map(h => `<div>${escapeHtml(h)}</div>`).join("")}
                </div>
              </div>`
            : "";

          const photosHtml = (data.photos && data.photos.length)
            ? `<div style="display:flex; gap:10px; overflow:auto; padding:8px 0 2px; margin-top:10px;">
                ${data.photos.map(url => `
                  <img src="${url}" alt="" style="height:140px; border-radius:12px; object-fit:cover;" />
                `).join("")}
              </div>`
            : "";

          body.innerHTML = `
            <div style="color:rgba(11,18,32,.75); font-size:14px; line-height:1.5;">
              ${data.address ? `<div><b>Address:</b> ${escapeHtml(data.address)}</div>` : ""}
              ${data.phone ? `<div><b>Phone:</b> ${escapeHtml(data.phone)}</div>` : ""}
              ${data.website ? `<div><b>Website:</b> <a href="${data.website}" target="_blank" rel="noreferrer">${escapeHtml(data.website)}</a></div>` : ""}
              ${typeof data.open_now === "boolean" ? `<div><b>Open now:</b> ${data.open_now ? "Yes" : "No"}</div>` : ""}
              ${data.rating ? `<div><b>Rating:</b> ${escapeHtml(String(data.rating))}</div>` : ""}
            </div>
            ${photosHtml}
            ${hoursHtml}
          `;
        } catch (e) {
          title.textContent = "Place details";
          body.textContent = "Could not load details. Check backend logs and API key.";
        }
      }

      function closeDetails() {
        document.getElementById("detailsModal").style.display = "none";
      }

      // Close modal when clicking backdrop
      document.addEventListener("click", (e) => {
        const modal = document.getElementById("detailsModal");
        if (modal.style.display === "block" && e.target === modal) closeDetails();
      });



    function getToken() {
      return localStorage.getItem('tragent_token');
    }

    function currentNextUrl() {
      return window.location.pathname + window.location.search;
    }

    function updateSignInLink() {
      document.getElementById('signInLink').href = `/login?next=${encodeURIComponent(currentNextUrl())}`;
    }

    function setSignedInUi(signedIn) {
      document.getElementById('signInLink').style.display = signedIn ? 'none' : '';
      document.getElementById('logoutBtn').style.display = signedIn ? '' : 'none';
      document.getElementById('savedTripsCard').style.display = signedIn ? '' : 'none';
    }

    async function authFetch(path, options = {}) {
      const token = getToken();
      const headers = { ...(options.headers || {}) };
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch(path, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || `Request failed: ${res.status}`);
      return data;
    }

    async function logout() {
      const token = getToken();
      localStorage.removeItem('tragent_token');
      setSignedInUi(false);
      if (token) {
        await fetch('/auth/logout', { method: 'POST', headers: { Authorization: `Bearer ${token}` } }).catch(() => {});
      }
    }

    let personalizationProfile = {
      group_type: 'solo',
      pace: 'balanced',
      budget: 'medium',
      place_style: 'mix',
      food_focus: true,
    };

    // Simple trip builder state (front-end only for now)
    const tripState = {
      destination: '',
      days: 3,
      activeDay: 1,
      itemsByDay: { 1: [], 2: [], 3: [] },
      currentTripId: null,
    };

    function resetDays(newDays) {
      tripState.days = newDays;
      const nextItems = {};
      for (let d = 1; d <= newDays; d++) {
        nextItems[d] = tripState.itemsByDay[d] || [];
      }
      tripState.itemsByDay = nextItems;
      if (tripState.activeDay > newDays) tripState.activeDay = 1;


      initDays();
      renderDays();
      renderItinerary();
      renderResults(lastResults);
    }

    async function loadSavedTrips() {
      const token = getToken();
      if (!token) return;
      setSignedInUi(true);

      const trips = await authFetch('/trips');
      const list = document.getElementById('savedTripsList');
      list.innerHTML = '';

      if (!trips.length) {
        list.innerHTML = '<div class="hint">No saved trips yet.</div>';
        return;
      }

      trips.forEach((t) => {
        const row = document.createElement('div');
        row.className = 'savedItem';
        row.innerHTML = `
          <div class="savedMeta">
            <div class="savedName">${escapeHtml(t.title)}</div>
            <div class="savedSub">${escapeHtml(t.destination)}</div>
          </div>
          <button class="savedBtn" type="button">Open</button>
          <button class="savedBtn danger" type="button">Delete</button>
        `;

        const buttons = row.querySelectorAll('button');
        const openBtn = buttons[0];
        const deleteBtn = buttons[1];

        openBtn.addEventListener('click', async () => {
          const trip = await authFetch(`/trips/${t.id}`);
          const maxDay = Math.max(1, ...(trip.items || []).map((i) => i.day || 1));
          tripState.destination = trip.destination || '';
          tripState.activeDay = 1;
          tripState.currentTripId = trip.id;
          tripState.itemsByDay = {};
          for (let d = 1; d <= maxDay; d++) tripState.itemsByDay[d] = [];
          (trip.items || []).forEach((i) => {
            if (!tripState.itemsByDay[i.day]) tripState.itemsByDay[i.day] = [];
            tripState.itemsByDay[i.day].push({
              id: i.id,
              position: i.position,
              place_id: i.place_id,
              name: i.name,
              address: i.address,
              rating: i.rating,
              lat: i.lat,
              lng: i.lng,
              notes: i.notes,
              completed: i.completed,
            });
          });
          resetDays(maxDay);
        });

        deleteBtn.addEventListener('click', async () => {
          await authFetch(`/trips/${t.id}`, { method: 'DELETE' });
          await loadSavedTrips();
        });

        list.appendChild(row);
      });
    }

    // Build day buttons
    function initDays() {
      const row = document.getElementById('dayRow');
      row.innerHTML = '';
      for (let d = 1; d <= tripState.days; d++) {
        const btn = document.createElement('button');
        btn.className = 'dayBtn' + (d === tripState.activeDay ? ' active' : '');
        btn.textContent = 'Day ' + d;
        btn.onclick = () => { tripState.activeDay = d; renderDays(); renderItinerary(); };
        row.appendChild(btn);
      }
    }

    function renderDays() {
      document.querySelectorAll('.dayBtn').forEach((b, idx) => {
        b.classList.toggle('active', idx + 1 === tripState.activeDay);
      });
    }

    function isAdded(placeId) {
      return tripState.itemsByDay[tripState.activeDay].some(x => x.place_id === placeId);
    }

    function persistEnabled() {
      return !!(getToken() && tripState.currentTripId);
    }

    function sortDayItems(day) {
      tripState.itemsByDay[day].sort((a, b) => (a.position || 0) - (b.position || 0));
    }

    async function persistReorder(day) {
      if (!persistEnabled()) return;
      sortDayItems(day);
      const orderedIds = tripState.itemsByDay[day].map((i) => i.id).filter(Boolean);
      if (!orderedIds.length) return;
      await fetch(`/trips/${tripState.currentTripId}/days/${day}/reorder`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
        body: JSON.stringify({ ordered_item_ids: orderedIds }),
      }).catch(() => {});
    }

    // LEFT panel render
    function renderItinerary() {
      const list = document.getElementById('itinList');
      sortDayItems(tripState.activeDay);
      const items = tripState.itemsByDay[tripState.activeDay];

      const saveBtn = document.getElementById('saveBtn');
      const totalCount = Object.values(tripState.itemsByDay).reduce((acc, arr) => acc + arr.length, 0);
      saveBtn.disabled = totalCount === 0;

      if (!items.length) {
        list.innerHTML = `<div class="empty">No places added for Day ${tripState.activeDay}. Add from the right.</div>`;
        return;
      }

      list.innerHTML = '';
      items.forEach((p, idx) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="num">${idx + 1}</div>
          <div class="meta">
            <div class="name" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</div>
            <div class="addr" title="${escapeHtml(p.address || '')}">${escapeHtml(p.address || '')}</div>
            <div style="margin-top:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
              <label style="display:flex;gap:6px;align-items:center;font-size:12px;color:var(--muted);font-weight:800">
                <input type="checkbox" ${p.completed ? 'checked' : ''} data-action="complete" data-id="${p.id || ''}" />
                Completed
              </label>
              <textarea data-action="notes" data-id="${p.id || ''}" placeholder="Notes" style="width:100%;margin-top:6px;padding:8px 10px;border-radius:12px;border:1px solid var(--border);font-size:13px;" rows="1">${escapeHtml(p.notes || '')}</textarea>
            </div>
          </div>
          <div class="itemActions">
            <button class="iconBtn" title="Move up" onclick="moveItem(${tripState.activeDay}, ${idx}, -1)">⬆️</button>
            <button class="iconBtn" title="Move down" onclick="moveItem(${tripState.activeDay}, ${idx}, 1)">⬇️</button>
            <button class="iconBtn" title="Remove" onclick="removeFromTrip('${p.place_id}')">🗑️</button>
          </div>
        `;

        const completeEl = div.querySelector('input[data-action="complete"]');
        if (completeEl) {
          completeEl.addEventListener('change', async (e) => {
            const checked = e.target.checked;
            p.completed = checked;
            if (persistEnabled() && p.id) {
              await fetch(`/trips/${tripState.currentTripId}/items/${p.id}` , {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
                body: JSON.stringify({ completed: checked }),
              }).catch(() => {});
            }
          });
        }

        const notesEl = div.querySelector('textarea[data-action="notes"]');
        if (notesEl) {
          notesEl.addEventListener('blur', async (e) => {
            const value = e.target.value;
            p.notes = value;
            if (persistEnabled() && p.id) {
              await fetch(`/trips/${tripState.currentTripId}/items/${p.id}` , {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
                body: JSON.stringify({ notes: value }),
              }).catch(() => {});
            }
          });
        }

        list.appendChild(div);
      });
    }

    async function moveItem(day, index, delta) {
      const items = tripState.itemsByDay[day];
      const nextIndex = index + delta;
      if (nextIndex < 0 || nextIndex >= items.length) return;
      const tmp = items[index];
      items[index] = items[nextIndex];
      items[nextIndex] = tmp;
      items.forEach((it, i) => { it.position = i + 1; });
      renderItinerary();
      await persistReorder(day);
    }

    function addToTrip(place) {
      if (isAdded(place.place_id)) return;
      tripState.itemsByDay[tripState.activeDay].push({ ...place, completed: false, notes: '', position: tripState.itemsByDay[tripState.activeDay].length + 1 });
      renderItinerary();
      // Update result buttons (so it shows Added)
      renderResults(lastResults);
    }

    async function removeFromTrip(placeId) {
      const dayItems = tripState.itemsByDay[tripState.activeDay];
      const item = dayItems.find((x) => x.place_id === placeId);
      tripState.itemsByDay[tripState.activeDay] = dayItems.filter(x => x.place_id !== placeId);
      tripState.itemsByDay[tripState.activeDay].forEach((it, idx) => { it.position = idx + 1; });
      renderItinerary();
      renderResults(lastResults);

      if (persistEnabled() && item?.id) {
        await fetch(`/trips/${tripState.currentTripId}/items/${item.id}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${getToken()}` },
        }).catch(() => {});
        await persistReorder(tripState.activeDay);
      }
    }

    // RIGHT results render
    let lastResults = [];
    function renderResults(results) {
      lastResults = results || [];
      const root = document.getElementById('results');
      root.innerHTML = '';

      if (!lastResults.length) {
        root.innerHTML = `<div class="searchCard" style="box-shadow:none">No results yet. Try a search.</div>`;
        return;
      }

      lastResults.forEach(p => {
        const added = isAdded(p.place_id);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="thumb">
            ${
              p.photo_url
                ? `<img src="${p.photo_url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:14px;" />`
                : `Photo`
            }
          </div>
          <div class="cardBody">
            <div class="cardTitle">${escapeHtml(p.name || 'Unknown')}</div>
            <div class="cardAddr">${escapeHtml(p.address || '')}</div>
            <div class="cardRow">
              ${p.rating ? `<span class="pill">⭐ ${escapeHtml(String(p.rating))}</span>` : ``}
              <span class="pill">Day ${tripState.activeDay}</span>
              <button class="addBtn" ${added ? 'disabled' : ''} data-place-id="${escapeHtml(p.place_id)}">
                ${added ? 'Added ✅' : 'Add to Trip'}
              </button>
            </div>
          </div>
        `;
        root.appendChild(card);
        card.style.cursor = "pointer";
        card.addEventListener("click", (e) => {
          // don't trigger if they clicked the Add button
          if (e.target.closest(".addBtn")) return;
          openDetails(p.place_id);
        });  
        const btn = card.querySelector(".addBtn");
        if (btn && !added) {
          btn.addEventListener('click', () => addToTrip(p));
        }
      });
    }
    
    const INTEREST_TO_QUERY = {
      food: "restaurants",
      coffee: "coffee shop",
      parks: "parks",
      museums: "museums",
      nightlife: "nightlife bars",
      shopping: "shopping",
      outdoors: "outdoor activities",
      history: "historical sites",
    };

    // Build queries like: "coffee shop in Brownsville, TX"
    function buildInterestQueries(destination, interestsCsv) {
      if (!interestsCsv) return [];
      const destPart = destination ? ` in ${destination}` : "";
      return interestsCsv
        .split(",")
        .map(s => s.trim())
        .filter(Boolean)
        .map(id => (INTEREST_TO_QUERY[id] || id) + destPart);
    }

    // Fetch results for many queries and merge + dedupe
    async function searchByInterests(destination, interestsCsv) {
      const queries = buildInterestQueries(destination, interestsCsv);
      if (!queries.length) return [];

      const all = [];
      for (const q of queries) {
        const res = await fetch(API_BASE + "/places/search?q=" + encodeURIComponent(q));
        if (!res.ok) continue;
        const data = await res.json();
        all.push(...(data.results || []));
      }

      // dedupe by place_id
      const seen = new Set();
      const deduped = [];
      for (const p of all) {
        if (!p.place_id || seen.has(p.place_id)) continue;
        seen.add(p.place_id);
        deduped.push(p);
      }
      return deduped;
    }







    async function runSearch() {
      const q = document.getElementById('q').value.trim();
      if (!q) return;

      const res = await fetch(API_BASE + '/places/search?q=' + encodeURIComponent(q));
      if (!res.ok) {
        renderResults([]);
        alert('Search failed. Check GOOGLE_MAPS_API_KEY and backend logs.');
        return;
      }
      const data = await res.json();
      renderResults(data.results || []);
    }

    async function runAiGenerate() {
      const destination = (tripState.destination || '').trim();
      const interests = (new URLSearchParams(window.location.search).get('interests') || '')
        .split(',')
        .map(s => s.trim())
        .filter(Boolean);

      if (!destination) {
        alert('No destination found.');
        return;
      }
      try {
        const res = await fetch('/ai/itinerary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json'},
          body: JSON.stringify({
            destination: destination,
            days: tripState.days,
            interests: interests,
            profile: personalizationProfile
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.detail || 'AI itinerary request failed');
        }
        
        const nextItemsByDay = {};
        for (let d = 1; d <= tripState.days; d++) {
          nextItemsByDay[d] = [];
        }

        const returnedDays = data.itinerary || [];
        returnedDays.forEach((dayInfo) => {
          const day = dayInfo.day;
          if (!nextItemsByDay[day]) nextItemsByDay[day] = [];

          const places = dayInfo.stops || dayInfo.places || [];
          nextItemsByDay[day] = places.map((place, idx) => ({
            place_id: place.place_id,
            name: place.name, 
            address: place.address || '',
            rating: place.rating || null,
            lat: place.lat || null,
            lng: place.lng || null,
            notes: '',
            completed: false,
            position: idx + 1,
          }));
        });

        tripState.destination = destination;
        tripState.itemsByDay = nextItemsByDay;
        tripState.activeDay = 1;

        initDays();
        renderDays();
        renderItinerary();


        console.log('FULL AI RESPONSE:',data);
        console.log('ITINERARY FIELD:',data.itinerary);

        alert('AI itinerary generated!');
        console.log('AI itinerary response: ', data);
      } catch (err) {
        alert('AI auto-generate failed: ' + err.message);
        console.error(err);
      }
    }

    // Demo save (backend save can be wired later)
    async function saveTrip() {
      const token = getToken();
      if (!token) {
        window.location.href = `/login?next=${encodeURIComponent(currentNextUrl())}`;
        return;
      }

      const destination = tripState.destination || document.getElementById('q').value.trim() || 'Destination';
      const title = `Trip to ${destination}`;

      const resTrip = await fetch('/trips', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ title, destination }),
      });
      const trip = await resTrip.json().catch(() => ({}));
      if (!resTrip.ok) {
        window.location.href = `/login?next=${encodeURIComponent(currentNextUrl())}`;
        return;
      }

      tripState.currentTripId = trip.id;

      for (const [dayStr, items] of Object.entries(tripState.itemsByDay)) {
        const day = parseInt(dayStr);
        for (const item of items) {
          const resItem = await fetch(`/trips/${trip.id}/items`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({
              day,
              place_id: item.place_id,
              name: item.name,
              notes: item.notes || '',
              lat: item.lat,
              lng: item.lng,
              address: item.address,
              rating: item.rating,
            }),
          });
          const saved = await resItem.json().catch(() => ({}));
          if (resItem.ok && saved.id) {
            item.id = saved.id;
            item.position = saved.position;
          }
        }
      }

      alert('Trip saved!');

      await loadSavedTrips();
    }

    // helper
    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderPlannerProfileSummary() {
      const el = document.getElementById('plannerProfileSummary');
      if (!el) return;

      el.innerHTML =  `
        <strong style="color:var(--ink);">Traveler profile:</strong><br>
        Group: ${personalizationProfile.group_type}<br>
        Pace: ${personalizationProfile.pace}<br>
        Budget: ${personalizationProfile.budget}<br>
        Place style: ${personalizationProfile.place_style}<br>
        Food focus: ${personalizationProfile.food_focus ? 'Yes' : 'No'}
      `;
    }
    const params = new URLSearchParams(window.location.search);
    const qParam = params.get('q');
    const destParam = params.get('dest');
    const daysParam = parseInt(params.get('days'));
    const interestsParam = params.get('interests');

    const groupTypeParam = params.get('group_type');
    const paceParam= params.get('pace');
    const budgetParam= params.get('budget');
    const placeStyleParam = params.get('place_style');
    const foodFocusParam = params.get('food_focus');


    if (groupTypeParam) personalizationProfile.group_type = groupTypeParam;
    if (paceParam) personalizationProfile.pace = paceParam;
    if (budgetParam) personalizationProfile.budget = budgetParam;
    if (placeStyleParam) personalizationProfile.place_style = placeStyleParam;
    if (foodFocusParam !== null) personalizationProfile.food_focus = (foodFocusParam === 'true');



    if (destParam) tripState.destination = destParam;
    if (daysParam && daysParam >= 1 && daysParam <= 7) {
      tripState.days = daysParam;
      tripState.itemsByDay = {};
      for (let d = 1; d <= daysParam; d++) tripState.itemsByDay[d] = [];
    }


    initDays();
    renderItinerary();
    renderResults([]);
    renderPlannerProfileSummary();
    /*
    if (qParam && !destParam) {
      document.getElementById('q').value = qParam;
      runSearch();
    }

    if (destParam) {
      // If interests were provided, do multi-search and combine results
      if (interestsParam) {
        document.getElementById('q').value = interestsParam.split(',').join(', ') + ' in ' + destParam;

        (async () => {
          const merged = await searchByInterests(destParam, interestsParam);
          renderResults(merged);
        })();
      } else {
        // fallback: regular single query search
        document.getElementById('q').value = destParam;
        runSearch();
      }*/

    if (destParam && interestsParam){
      document.getElementById('q').value = interestsParam.split(',').join(', ') + ' in ' + destParam;
      (async () => {
        const merged = await searchByInterests(destParam, interestsParam);
        renderResults(merged);
      })();
    } else if (qParam) {
      document.getElementById('q').value = qParam;
      runSearch();
    } else if (destParam) {
      document.getElementById('q').value = destParam;
      runSearch();
    }

    updateSignInLink();
    setSignedInUi(!!getToken());
    if (getToken()) {
      loadSavedTrips().catch(() => {});
    }
    




  </script>
  <div id="detailsModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9999; padding:18px;">
    <div style="max-width:720px; margin:40px auto; background:white; border-radius:16px; overflow:hidden;">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid rgba(11,18,32,.12);">
        <div style="font-weight:900" id="detailsTitle">Place details</div>
        <button onclick="closeDetails()" style="border:none; background:transparent; font-size:18px; cursor:pointer;">✕</button>
      </div>

      <div style="padding:16px;" id="detailsBody">
        Loading…
      </div>
    </div>
  </div>
